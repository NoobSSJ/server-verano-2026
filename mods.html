<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modpack ATM10 — Minecraft Server</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── ATM10 hero banner ──────────────────────────────────── */
    .atm-hero {
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a1a 100%);
      border: 1px solid #2a1a4a;
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      position: relative; overflow: hidden;
      display: flex; align-items: center; gap: 2rem;
    }
    .atm-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(139,92,246,.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(74,222,128,.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .atm-logo {
      width: 80px; height: 80px; flex-shrink: 0;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 0 30px rgba(124,58,237,.4);
      border: 1px solid rgba(139,92,246,.4);
    }
    .atm-hero-text h1 {
      font-family: var(--font-pixel);
      font-size: clamp(.65rem, 1.8vw, .9rem);
      color: #a78bfa; text-shadow: 0 0 20px #7c3aed;
      margin-bottom: .4rem; line-height: 1.8;
    }
    .atm-hero-text p { color: var(--text-muted); font-size: .9rem; }
    .atm-badges { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: .9rem; }
    .atm-badge {
      padding: .25rem .7rem; border-radius: 20px; font-size: .75rem; font-weight: 600;
      background: rgba(139,92,246,.15); color: #c4b5fd;
      border: 1px solid rgba(139,92,246,.3);
    }
    .atm-badge.green { background: var(--green-glow); color: var(--green); border-color: rgba(74,222,128,.3); }
    .atm-badge.blue  { background: var(--blue-glow);  color: var(--blue);  border-color: rgba(96,165,250,.3); }

    /* ── Summary KPIs ────────────────────────────────────────── */
    .mods-summary { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .mod-kpi {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: .75rem 1.25rem;
      display: flex; align-items: center; gap: .75rem;
    }
    .mod-kpi .mk-icon { font-size: 1.4rem; }
    .mod-kpi .mk-val  { font-weight: 700; font-size: 1.1rem; }
    .mod-kpi .mk-label{ font-size: .75rem; color: var(--text-muted); }

    /* ── Filters ─────────────────────────────────────────────── */
    .mods-filters {
      display: flex; gap: .6rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; align-items: center;
    }
    .filter-btn {
      padding: .35rem .85rem; border-radius: 20px;
      border: 1px solid var(--border); background: var(--panel);
      color: var(--text-muted); font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: var(--font-body);
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: #7c3aed; color: #c4b5fd; background: rgba(124,58,237,.15);
    }
    .mod-search {
      flex: 1; max-width: 280px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: .35rem 1rem;
      color: var(--text); font-size: .85rem; font-family: var(--font-body);
      outline: none; transition: border-color .15s;
    }
    .mod-search:focus { border-color: #7c3aed; }
    .mod-search::placeholder { color: var(--text-dim); }

    /* ── Category section ────────────────────────────────────── */
    .category-section { margin-bottom: 2rem; }
    .category-header {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.25rem; border-radius: var(--radius) var(--radius) 0 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .category-header h2 {
      font-size: .9rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
    }
    .cat-count {
      margin-left: auto; font-size: .72rem; font-weight: 600;
      padding: .15rem .5rem; border-radius: 10px;
      background: rgba(255,255,255,.08);
    }

    /* ── Mod cards ───────────────────────────────────────────── */
    .mods-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1px;
      background: var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
    }
    .mod-card {
      background: var(--panel2);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: .45rem;
      transition: background .15s;
      animation: fadeUp .35s ease both;
    }
    .mod-card:hover { background: var(--dark3); }
    .mod-card-top { display: flex; align-items: flex-start; gap: .7rem; }
    .mod-icon-box {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .mod-name {
      font-weight: 700; font-size: .875rem;
      display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
      line-height: 1.3;
    }
    .mod-version {
      font-size: .65rem; color: var(--text-dim);
      font-family: monospace; padding: .1rem .3rem;
      background: var(--dark3); border-radius: 4px; white-space: nowrap;
    }
    .mod-desc { font-size: .78rem; color: var(--text-muted); line-height: 1.5; }
    .mod-footer {
      display: flex; align-items: center; gap: .5rem; margin-top: .2rem;
    }
    .core-badge {
      font-size: .65rem; font-weight: 700; padding: .1rem .4rem;
      border-radius: 8px; text-transform: uppercase; letter-spacing: .06em;
    }
    .core-yes  { background:rgba(167,139,250,.15); color:#c4b5fd; border:1px solid rgba(167,139,250,.3); }
    .core-no   { background:rgba(100,116,139,.08); color:var(--text-dim); border:1px solid rgba(100,116,139,.15); }
    .spotlight { background:rgba(251,191,36,.08); color:var(--amber); border:1px solid rgba(251,191,36,.2); }

    .dl-btn {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .25rem .65rem; border-radius: var(--radius);
      font-size: .72rem; font-weight: 600; text-decoration: none;
      background: rgba(124,58,237,.15); color: #c4b5fd;
      border: 1px solid rgba(139,92,246,.25);
      transition: all .15s; white-space: nowrap;
    }
    .dl-btn:hover { background: #7c3aed; color: #fff; }

    /* spotlight card */
    .spotlight-card {
      background: linear-gradient(135deg, rgba(124,58,237,.1), rgba(79,70,229,.08));
      border: 1px solid rgba(139,92,246,.25);
      border-radius: var(--radius); padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }
    .spotlight-card h3 {
      font-size: .85rem; font-weight: 700; color: #c4b5fd; margin-bottom: .4rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .spotlight-card p { font-size: .8rem; color: var(--text-muted); line-height: 1.6; }

    /* download all box */
    .download-all {
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(74,222,128,.08));
      border: 1px solid rgba(139,92,246,.3);
      border-radius: var(--radius-lg); padding: 1.5rem 2rem;
      display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
      margin-top: 2rem;
    }
    .download-all h3 { font-size: 1rem; font-weight: 700; color: #c4b5fd; }
    .download-all p  { font-size: .85rem; color: var(--text-muted); margin-top: .2rem; }
    .big-btn {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .7rem 1.5rem; border-radius: var(--radius);
      font-size: .9rem; font-weight: 700; text-decoration: none;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; cursor: pointer;
      box-shadow: 0 0 20px rgba(124,58,237,.35);
      transition: all .2s; font-family: var(--font-body);
    }
    .big-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(124,58,237,.5); }
  </style>
</head>

  },

/* ── Render KPIs ───────────────────────────────────────────── */
const totalMods = ATM10_MODS.reduce((a,c)=>a+c.mods.length,0);
const coreMods  = ATM10_MODS.reduce((a,c)=>a+c.mods.filter(m=>m.core).length,0);
document.getElementById('mods-kpis').innerHTML = [
  { icon:"📦", val:"~500",             label:"Mods totales en ATM10" },
  { icon:"⭐", val:coreMods,           label:"Core del pack" },
  { icon:"🗂", val:ATM10_MODS.length,  label:"Categorías" },
  { icon:"🎮", val:"1.21.1",           label:"Versión Minecraft" },
].map(k=>`
  <div class="mod-kpi">
    <span class="mk-icon">${k.icon}</span>
    <div>
      <div class="mk-val">${k.val}</div>
      <div class="mk-label">${k.label}</div>
    </div>
  </div>`).join('');

/* ── Spotlights ─────────────────────────────────────────────── */
document.getElementById('spotlights').innerHTML = SPOTLIGHTS.map(s=>`
  <div class="spotlight-card" style="border-color:${s.color}44;background:${s.color}0d">
    <h3 style="color:${s.color}">${s.icon} ${s.title}</h3>
    <p>${s.desc}</p>
  </div>`).join('');

/* ── Filters ────────────────────────────────────────────────── */
let currentCat    = 'all';
let currentSearch = '';

/* dynamic category filter buttons */
const filterBar = document.querySelector('.mods-filters');
ATM10_MODS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat.category;
  btn.textContent = `${cat.icon} ${cat.category.split(' ')[0]}`;
  filterBar.appendChild(btn);
});

function renderMods() {
  const container = document.getElementById('mods-container');
  container.innerHTML = '';
  ATM10_MODS.forEach((cat, ci) => {
    const filtered = cat.mods.filter(m => {
      const s = currentSearch.toLowerCase();
      const matchSearch = !s || m.name.toLowerCase().includes(s) || m.desc.toLowerCase().includes(s);
      const matchCat    = currentCat==='all' ||
                          (currentCat==='core' && m.core) ||
                          currentCat===cat.category;
      return matchSearch && matchCat;
    });
    if (!filtered.length) return;

    const sec = document.createElement('div');
    sec.className = 'category-section fade-up';
    sec.style.animationDelay = `${ci*0.05}s`;
    sec.innerHTML = `
      <div style="background:${cat.color}18;border:1px solid ${cat.color}33;border-bottom:none;border-radius:var(--radius) var(--radius) 0 0" class="category-header">
        <span style="font-size:1.2rem">${cat.icon}</span>
        <h2 style="color:${cat.color}">${cat.category}</h2>
        <span class="cat-count" style="background:${cat.color}22;color:${cat.color}">${filtered.length} mods</span>
      </div>
      <div class="mods-grid" style="border:1px solid ${cat.color}22;border-radius:0 0 var(--radius) var(--radius)">
        ${filtered.map((m,mi)=>`
          <div class="mod-card" style="animation-delay:${mi*0.04}s">
            <div class="mod-card-top">
              <div class="mod-icon-box" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
              <div style="flex:1;min-width:0">
                <div class="mod-name">
                  ${m.name}
                  <span class="mod-version">${m.version}</span>
                </div>
              </div>
            </div>
            <p class="mod-desc">${m.desc}</p>
            <div class="mod-footer">
              <span class="core-badge ${m.core?'core-yes':'core-no'}">${m.core?'⭐ Core':'Opcional'}</span>
              ${m.spotlight?'<span class="core-badge spotlight">🔦 Destacado</span>':''}
              <a class="dl-btn" href="${m.url}" target="_blank" rel="noopener">↗ CurseForge</a>
            </div>
          </div>`).join('')}
      </div>`;
    container.appendChild(sec);
  });

  if (!container.children.length) {
    container.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-dim)">No se encontraron mods para «${currentSearch}»</div>`;
  }
}
renderMods();

document.getElementById('mod-search').addEventListener('input', e=>{
  currentSearch=e.target.value; renderMods();
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat=btn.dataset.cat;
    renderMods();
  });
});
</script>
