<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inicio — Minecraft Server</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Hero ──────────────────────────────────────────────── */
    .hero {
      display: flex; align-items: center; gap: 2rem;
      background: linear-gradient(135deg, var(--panel) 0%, var(--dark3) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '⛏';
      position: absolute; right: -1rem; top: -1.5rem;
      font-size: 9rem; opacity: .04;
      pointer-events: none; user-select: none;
    }
    .hero-text h1 {
      font-family: var(--font-pixel);
      font-size: clamp(.7rem, 2vw, 1rem);
      color: var(--green);
      text-shadow: 0 0 20px var(--green);
      margin-bottom: .6rem; line-height: 1.8;
    }
    .hero-text p { color: var(--text-muted); font-size: .95rem; max-width: 480px; }
    .hero-badges { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1rem; }
    .hero-badge {
      display: flex; align-items: center; gap: .35rem;
      padding: .3rem .75rem; border-radius: 20px;
      font-size: .78rem; font-weight: 600;
      background: var(--dark3); border: 1px solid var(--border); color: var(--text-muted);
    }
    .hero-badge.green { background: var(--green-glow); border-color: rgba(74,222,128,.3); color: var(--green); }

    /* ── Online player card ────────────────────────────────── */
    .player-card {
      display: flex; align-items: center; gap: 1rem;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: all .2s;
      animation: fadeUp .4s ease both;
    }
    .player-card:hover {
      border-color: rgba(74,222,128,.3);
      background: var(--dark3);
      transform: translateY(-2px);
    }
    .player-card-info { flex: 1; min-width: 0; }
    .player-card-name {
      font-weight: 700; font-size: .95rem;
      display: flex; align-items: center; gap: .5rem;
      flex-wrap: wrap;
    }
    .player-card-meta {
      display: flex; gap: .75rem; flex-wrap: wrap; margin-top: .4rem;
    }
    .player-card-meta span {
      display: flex; align-items: center; gap: .3rem;
      font-size: .75rem; color: var(--text-muted);
    }
    .player-card-time {
      text-align: right; font-size: .78rem; color: var(--text-dim);
      white-space: nowrap;
    }
    .player-card-time strong { display: block; color: var(--green); font-size: .85rem; }

    .session-bar {
      height: 3px; border-radius: 2px;
      background: var(--border); margin-top: .5rem;
      overflow: hidden;
    }
    .session-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--green-d), var(--green));
      transition: width 1s ease;
    }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .4; }

    /* ── Activity feed ──────────────────────────────────────── */
    .feed-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-item .feed-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: .9rem; flex-shrink: 0;
      background: var(--dark3);
    }
    .feed-item .feed-time { margin-left: auto; color: var(--text-dim); font-size: .75rem; white-space: nowrap; }

    /* ── Server info grid ───────────────────────────────────── */
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 0; border-bottom: 1px solid var(--border);
      font-size: .875rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .info-label { color: var(--text-muted); display: flex; align-items: center; gap: .5rem; }
    .info-row .info-val   { font-weight: 600; color: var(--text); font-family: monospace; font-size: .85rem; }

    .copy-btn {
      background: var(--dark3); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px;
      padding: .2rem .5rem; font-size: .72rem; cursor: pointer;
      transition: all .15s;
    }
    .copy-btn:hover { border-color: var(--green); color: var(--green); }

    /* ── Slot bar ────────────────────────────────────────────── */
    .slot-bar {
      height: 8px; border-radius: 4px;
      background: var(--border); margin: .75rem 0 .25rem;
      overflow: hidden;
    }
    .slot-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--green-d), var(--green));
    }
  </style>
</head>
<body>
<script src="data.js"></script>
<script src="nav.js"></script>

<main>
  <!-- Hero -->
  <div class="hero fade-up">
    <div class="hero-text">
      <h1 id="server-name">Cargando...</h1>
      <p id="server-motd"></p>
      <div class="hero-badges" id="hero-badges"></div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="grid-4" style="margin-bottom:2rem" id="kpi-grid"></div>

  <!-- Main grid -->
  <div class="grid-2" style="margin-bottom:1.5rem">

    <!-- Online players -->
    <div class="panel fade-up delay-1" style="grid-column: 1">
      <div class="panel-header">
        <span class="panel-icon" style="color:var(--green)">🟢</span>
        <h2>Jugadores en línea</h2>
        <span style="margin-left:auto;font-size:.75rem;color:var(--text-dim)" id="online-updated">Actualizado ahora</span>
      </div>
      <div id="online-list"></div>
    </div>

    <!-- Right column -->
    <div style="display:flex;flex-direction:column;gap:1.25rem">

      <!-- Server info -->
      <div class="panel fade-up delay-2">
        <div class="panel-header">
          <span class="panel-icon" style="color:var(--blue)">🖥</span>
          <h2>Info del Servidor</h2>
        </div>
        <div id="server-info-list"></div>
      </div>

      <!-- Activity feed -->
      <div class="panel fade-up delay-3">
        <div class="panel-header">
          <span class="panel-icon" style="color:var(--amber)">📡</span>
          <h2>Actividad Reciente</h2>
        </div>
        <div id="activity-feed"></div>
      </div>

    </div>
  </div>

  <!-- Top players -->
  <div class="panel fade-up delay-4">
    <div class="panel-header">
      <span class="panel-icon" style="color:var(--amber)">🏆</span>
      <h2>Top Jugadores — Tiempo Total</h2>
      <a href="players.html" style="margin-left:auto;font-size:.78rem;color:var(--green);text-decoration:none">Ver todos →</a>
    </div>
    <div id="top-players" class="grid-4"></div>
  </div>

</main>

<script>
buildNav('index.html');
buildFooter();

/* ── Render hero ─────────────────────────────────────────── */
document.getElementById('server-name').textContent = SERVER.name;
document.getElementById('server-motd').textContent = SERVER.motd;
document.getElementById('hero-badges').innerHTML = `
  <span class="hero-badge green">🟢 Online</span>
  <span class="hero-badge">🎮 ${SERVER.version}</span>
  <span class="hero-badge">🌐 ${SERVER.ip}</span>
`;

/* ── KPIs ─────────────────────────────────────────────────── */
const totalMinutes = ALL_PLAYERS.reduce((a, p) => a + p.totalMinutes, 0);
const kpis = [
  { label:"Jugadores Online",   value: ONLINE_PLAYERS.length, sub:`de ${SERVER.maxPlayers} slots`, cls:"kpi-green" },
  { label:"Miembros Totales",   value: ALL_PLAYERS.length, sub:"registrados", cls:"kpi-blue" },
  { label:"Horas Jugadas",      value: Math.floor(totalMinutes/60)+"h", sub:"entre todos", cls:"kpi-amber" },
  { label:"Slots Libres",       value: SERVER.maxPlayers - ONLINE_PLAYERS.length, sub:"disponibles", cls:"" },
];
document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
  <div class="kpi-card ${k.cls} fade-up">
    <span class="kpi-label">${k.label}</span>
    <span class="kpi-value">${k.value}</span>
    <span class="kpi-sub">${k.sub}</span>
  </div>`).join('');

/* ── Online players list ──────────────────────────────────── */
const onlineList = document.getElementById('online-list');
if (ONLINE_PLAYERS.length === 0) {
  onlineList.innerHTML = `<div class="empty-state">
    <div class="empty-icon">😴</div>
    <p>No hay jugadores conectados</p>
  </div>`;
} else {
  const maxSess = Math.max(...ONLINE_PLAYERS.map(p => Date.now() - new Date(p.joinedAt)));
  onlineList.innerHTML = ONLINE_PLAYERS.map((p, i) => {
    const sessMs   = Date.now() - new Date(p.joinedAt);
    const sessPct  = Math.min(100, (sessMs / (4 * 3600000)) * 100); // 4h = 100%
    return `
    <div class="player-card" style="animation-delay:${i*0.06}s;margin-bottom:.75rem">
      <img class="avatar" src="${p.avatar}" alt="${p.name}" onerror="this.src='https://mc-heads.net/avatar/Steve/40'">
      <div class="player-card-info">
        <div class="player-card-name">
          ${p.name} ${roleBadge(p.role)}
        </div>
        <div class="player-card-meta">
          <span>${statusIcon(p.status)} ${p.status}</span>
          <span>📍 ${p.location}</span>
        </div>
        <div class="session-bar"><div class="session-bar-fill" style="width:${sessPct}%"></div></div>
      </div>
      <div class="player-card-time">
        <strong>${timeSince(p.joinedAt)}</strong>
        en sesión
      </div>
    </div>`;
  }).join('');
}

/* ── Server info ─────────────────────────────────────────── */
const pct = Math.round((ONLINE_PLAYERS.length / SERVER.maxPlayers) * 100);
document.getElementById('server-info-list').innerHTML = `
  <div class="info-row">
    <span class="info-label">🌐 IP del servidor</span>
    <span class="info-val">${SERVER.ip} <button class="copy-btn" onclick="navigator.clipboard.writeText('${SERVER.ip}');this.textContent='✓'">Copiar</button></span>
  </div>
  <div class="info-row">
    <span class="info-label">🔌 Puerto</span>
    <span class="info-val">${SERVER.port}</span>
  </div>
  <div class="info-row">
    <span class="info-label">🎮 Versión</span>
    <span class="info-val">${SERVER.version}</span>
  </div>
  <div class="info-row">
    <span class="info-label">👥 Ocupación</span>
    <span class="info-val">${ONLINE_PLAYERS.length} / ${SERVER.maxPlayers}</span>
  </div>
  <div class="slot-bar"><div class="slot-bar-fill" style="width:${pct}%"></div></div>
  <div style="font-size:.72rem;color:var(--text-dim)">${pct}% de capacidad</div>`;

/* ── Activity feed ───────────────────────────────────────── */
const feed = [
  ...ONLINE_PLAYERS.map(p => ({
    icon:"🟢", text:`<b>${p.name}</b> se conectó`, time: timeSince(p.joinedAt)+" ago", color:"var(--green)"
  })),
  { icon:"⛏", text:"<b>Herobrine</b> terminó su base subterránea", time:"hace 2h", color:"var(--blue)" },
  { icon:"🏆", text:"<b>Notch</b> desbloqueó el logro «Maestro Constructor»", time:"hace 5h", color:"var(--amber)" },
  { icon:"🗺", text:"<b>Creeper</b> añadió un waystone nuevo: «Cueva Secreta»", time:"hace 1d", color:"var(--purple)" },
];
document.getElementById('activity-feed').innerHTML = feed.slice(0,6).map(f => `
  <div class="feed-item">
    <div class="feed-icon" style="color:${f.color}">${f.icon}</div>
    <span style="font-size:.83rem">${f.text}</span>
    <span class="feed-time">${f.time}</span>
  </div>`).join('');

/* ── Top players ─────────────────────────────────────────── */
const top = [...ALL_PLAYERS].sort((a,b) => b.totalMinutes - a.totalMinutes).slice(0,4);
document.getElementById('top-players').innerHTML = top.map((p, i) => {
  const medals = ["🥇","🥈","🥉","4️⃣"];
  return `
  <div class="panel" style="text-align:center;padding:1.25rem 1rem">
    <div style="font-size:1.5rem;margin-bottom:.5rem">${medals[i]}</div>
    <img class="avatar avatar-lg" src="${p.avatar}" alt="${p.name}" style="margin:0 auto .5rem" onerror="this.src='https://mc-heads.net/avatar/Steve/40'">
    <div style="font-weight:700;margin-bottom:.3rem">${p.name}</div>
    <div style="margin-bottom:.5rem">${roleBadge(p.role)}</div>
    <div style="font-size:.78rem;color:var(--text-muted)">${formatMinutes(p.totalMinutes)}</div>
  </div>`;
}).join('');

/* ── Auto-refresh counter ────────────────────────────────── */
let secs = 30;
const upd = document.getElementById('online-updated');
setInterval(() => {
  secs--;
  if (secs <= 0) { secs = 30; upd.textContent = 'Actualizado ahora'; }
  else upd.textContent = `Actualiza en ${secs}s`;
}, 1000);
</script>
</body>
</html>
